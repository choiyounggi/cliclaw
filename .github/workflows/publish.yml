# Publish @younggichoi/cliclaw to npm whenever a GitHub Release is published.
#
# Triggered by Release (not tag push) so that a stray `git push --follow-tags`
# from a working branch cannot accidentally publish — Releases are an
# explicit, reviewable artifact.
#
# Authentication uses npm Trusted Publishing (OIDC). No long-lived secret
# is required — the workflow exchanges a short-lived GitHub-signed JWT for
# an npm publish token at run time, so a leaked repo secret can't be used
# to push malicious versions.
#
# One-time setup on the npm side:
#   1. https://www.npmjs.com/package/@younggichoi/cliclaw/access
#   2. "Trusted Publisher" → "GitHub Actions"
#   3. Organization: choiyounggi
#      Repository:   cliclaw
#      Workflow:     publish.yml
#      (Environment: leave blank)
#   4. Save.

name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  # Required for OIDC token exchange with npm.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # npm 11.5+ is required for Trusted Publishing; node 22 ships with it.
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Refuse to publish if the Release tag and package.json version disagree
      # (e.g. user forgot to run `npm version` before creating the Release).
      # Fail-fast is preferable to publishing the wrong artifact.
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json: $PKG_VERSION"
          echo "release tag : $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag '$TAG_VERSION' does not match package.json '$PKG_VERSION'. Bump package.json or retag before publishing."
            exit 1
          fi

      # --provenance generates an attestation that ties this published
      # tarball to the GitHub commit + workflow it came from. npmjs.com
      # shows a "Provenance" badge for the version and users can verify
      # via `npm audit signatures` or sigstore.
      - name: Publish
        run: npm publish --access public --provenance
