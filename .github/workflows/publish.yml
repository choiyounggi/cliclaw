# Publish @younggichoi/cliclaw to npm whenever a GitHub Release is published.
#
# Triggered by Release (not tag push) so that a stray `git push --follow-tags`
# from a working branch cannot accidentally publish — Releases are an
# explicit, reviewable artifact.
#
# Authentication: a long-lived npm token stored in the repository secret
# NPM_TOKEN. The token must have 2FA bypass enabled (Automation Classic
# Token, or a Granular Access Token with "Bypass 2FA" checked) so the
# workflow can publish without an interactive OTP prompt.
#
# Trusted Publishing (OIDC) is the modern alternative — it removes the
# need for a long-lived secret. To switch later:
#   1. Register this workflow at:
#      https://www.npmjs.com/package/@younggichoi/cliclaw/access
#      (Trusted Publisher → GitHub Actions, workflow filename: publish.yml)
#   2. Add `permissions: id-token: write` to this job
#   3. Drop NODE_AUTH_TOKEN and the NPM_TOKEN secret
#   4. Add `--provenance` to the publish command for an npm attestation badge

name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + npm registry auth
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Refuse to publish if the Release tag and package.json version disagree
      # (e.g. user forgot to run `npm version` before creating the Release).
      # Fail-fast is preferable to publishing the wrong artifact.
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json: $PKG_VERSION"
          echo "release tag : $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag '$TAG_VERSION' does not match package.json '$PKG_VERSION'. Bump package.json or retag before publishing."
            exit 1
          fi

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
