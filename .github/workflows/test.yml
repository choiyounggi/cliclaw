# Run the vitest suite + tsc --noEmit on every push to main and every PR.
# Guards against regressions before they reach a publish: the publish.yml
# workflow only fires on Release create, so without this CI a PR could
# merge with broken tests and ship as the next version.

name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun --bun x tsc --noEmit

      - name: Run tests
        run: bun test
